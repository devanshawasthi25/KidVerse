<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KidVerse — A 3D virtual world for kids learning. Explore, play games, watch stories, and learn with AI!" />
  <title>KidVerse — Your 3D Learning World 🌍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif; overflow: hidden;
      background: #0a0a1a; color: white; height: 100vh;
    }
    h1, h2, h3 { font-family: 'Fredoka One', cursive; }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; }

    .landing {
      position: relative; z-index: 10; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }

    .logo-3d {
      font-family: 'Fredoka One', cursive; font-size: clamp(3rem, 8vw, 5rem);
      background: linear-gradient(135deg, #FF9A8B, #FFD166, #6BCB77, #C9B8FF, #FF9A8B);
      background-size: 300% 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: gradientShift 6s ease infinite;
      margin-bottom: 8px;
      text-shadow: none;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .tagline {
      font-size: 1.25rem; color: rgba(255,255,255,0.6);
      font-weight: 600; margin-bottom: 40px; max-width: 480px;
      line-height: 1.6;
    }

    .cta-row {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 48px;
    }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 36px; border-radius: 999px;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.1rem;
      border: none; cursor: pointer; text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-btn:hover { transform: translateY(-3px); }
    .cta-primary {
      background: linear-gradient(135deg, #FF9A8B, #FF7A68);
      color: white; box-shadow: 0 6px 30px rgba(255,122,104,0.4);
    }
    .cta-primary:hover { box-shadow: 0 10px 40px rgba(255,122,104,0.6); }
    .cta-secondary {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.15);
      color: white;
    }
    .cta-secondary:hover { background: rgba(255,255,255,0.15); }

    /* Feature pills */
    .features-row {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      max-width: 700px;
    }
    .feat-pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px; padding: 10px 20px;
      font-weight: 700; font-size: 0.9rem; color: rgba(255,255,255,0.7);
      transition: all 0.3s;
    }
    .feat-pill:hover {
      background: rgba(255,255,255,0.12);
      color: white; transform: translateY(-2px);
    }
    .feat-pill .icon { font-size: 1.3rem; }

    /* Globe emoji */
    .globe {
      font-size: 5rem; margin-bottom: 20px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-15px) rotate(5deg); }
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      text-align: center; padding: 16px;
      color: rgba(255,255,255,0.3); font-size: 0.82rem;
      font-weight: 600; z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="landing">
    <div class="globe">🌍</div>
    <h1 class="logo-3d">KidVerse</h1>
    <p class="tagline">
      A 3D virtual world where kids explore, play games, watch interactive stories, and learn — all powered by AI.
    </p>
    <div class="cta-row">
      <a href="/login" class="cta-btn cta-primary" id="main-cta">🚀 Enter the World</a>
      <a href="/login" class="cta-btn cta-secondary" id="login-cta">🔑 Login</a>
    </div>
    <div class="features-row">
      <div class="feat-pill"><span class="icon">🎮</span> 3D Games</div>
      <div class="feat-pill"><span class="icon">📺</span> Video Stories</div>
      <div class="feat-pill"><span class="icon">🤖</span> AI Chat</div>
      <div class="feat-pill"><span class="icon">🎨</span> Drawing</div>
      <div class="feat-pill"><span class="icon">📖</span> Story Creator</div>
      <div class="feat-pill"><span class="icon">🏆</span> Leaderboard</div>
    </div>
  </div>

  <div class="bottom-bar">
    🌱 Safe · 🎓 Educational · 🎮 Gamified · 😊 Fun for ages 1–14
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ── Animated 3D background ─────────────────────────────────────
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);
    cam.position.set(0, 0, 30);

    // Lights
    scene.add(new THREE.AmbientLight(0x9381FF, 0.3));
    const dirL = new THREE.DirectionalLight(0xDA70D6, 0.8);
    dirL.position.set(10, 20, 10);
    scene.add(dirL);

    // Floating geometric shapes
    const shapes = [];
    const geos = [
      new THREE.IcosahedronGeometry(1, 0),
      new THREE.OctahedronGeometry(1, 0),
      new THREE.TorusGeometry(0.8, 0.3, 8, 16),
      new THREE.TetrahedronGeometry(1, 0),
      new THREE.DodecahedronGeometry(1, 0),
    ];
    const colors = [0xFF9A8B, 0xFFD166, 0x6BCB77, 0xC9B8FF, 0x4ECDC4, 0xFF6B6B];

    for (let i = 0; i < 40; i++) {
      const geo = geos[Math.floor(Math.random()*geos.length)];
      const mat = new THREE.MeshStandardMaterial({
        color: colors[Math.floor(Math.random()*colors.length)],
        roughness: 0.4, metalness: 0.3,
        transparent: true, opacity: 0.3,
        wireframe: Math.random() > 0.5,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        (Math.random()-0.5)*60,
        (Math.random()-0.5)*40,
        (Math.random()-0.5)*40 - 10,
      );
      mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
      mesh.scale.setScalar(0.5 + Math.random()*2);
      mesh.userData = {
        speed: 0.002 + Math.random()*0.005,
        axis: new THREE.Vector3(Math.random(), Math.random(), 0).normalize(),
        drift: (Math.random()-0.5)*0.01,
      };
      scene.add(mesh);
      shapes.push(mesh);
    }

    // Particles
    const pCount = 600;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount*3);
    for (let i = 0; i < pCount; i++) {
      pPos[i*3]   = (Math.random()-0.5)*100;
      pPos[i*3+1] = (Math.random()-0.5)*60;
      pPos[i*3+2] = (Math.random()-0.5)*60 - 10;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
      color: 0xC9B8FF, size: 0.15, transparent: true, opacity: 0.5,
      blending: THREE.AdditiveBlending,depthWrite:false,
    })));

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.01;
      shapes.forEach(s => {
        s.rotation.x += s.userData.speed;
        s.rotation.y += s.userData.speed * 0.7;
        s.position.y += Math.sin(t + s.position.x) * 0.003;
      });
      cam.position.x = Math.sin(t*0.1) * 3;
      cam.position.y = Math.cos(t*0.15) * 2;
      cam.lookAt(0,0,0);
      renderer.render(scene, cam);
    }
    animate();

    window.addEventListener('resize', () => {
      cam.aspect = window.innerWidth/window.innerHeight;
      cam.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Check returning user
    const uid = localStorage.getItem('kidverse_user_id');
    if (uid && uid !== '0') {
      document.getElementById('main-cta').href = `/world?user_id=${uid}`;
      document.getElementById('main-cta').textContent = '🌍 Enter Your World';
      document.getElementById('login-cta').href = `/world?user_id=${uid}`;
      document.getElementById('login-cta').textContent = '👋 Welcome Back!';
    }
  </script>
</body>
</html>
